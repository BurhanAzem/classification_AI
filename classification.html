<!DOCTYPE html>
<html>
<head>
  <title>Binary Classification</title>
  <link rel="stylesheet" type="text/css" href="classification.css">
</head>
<body>
  <div class="container">
    <h1>Binary Classification</h1>
    <div class="input-section">
      <label for="x-coordinate">X-coordinate:</label>
      <div  id="x-coordinate"></div> 
      <label for="y-coordinate">Y-coordinate:</label>
      <div  id="y-coordinate"></div>
      <button onclick="addDataPoint()">Add Data Point</button>
    </div>
    <div>
      <label for="learning-rate">Learning Rate:</label>
      <input type="number" id="learning-rate">
      <label for="max-iterations">Maximum Iterations:</label>
      <input type="number" id="max-iterations">
      <button onclick="trainModel()">Train Model</button>
    </div>
    <div class="canvas-container" >
      <canvas id="classification-canvas"></canvas>
    </div>
    <div class="performance-section">
      <h3>Performance:</h3>
      <p id="accuracy">Accuracy: -</p>
      <p id="precision">Precision: -</p>
      <p id="recall">Recall: -</p>
    </div>
  </div>
  
  <script src="classification.js"></script>
</body>
</html>
